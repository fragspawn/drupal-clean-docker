name: drupal9
services:
  db:
    build:
      context: .
      args:
        MYSQL_DATABASE: ${DB}
        MYSQL_USER: ${DBU}
        MYSQL_PASSWORD: ${DBP}
      dockerfile: Dockerfile.db
    container_name: drupal-persist
    restart: always
    environment:
      MYSQL_DATABASE: ${DB} 
      MYSQL_USER: ${DBU} 
      MYSQL_PASSWORD: ${DBP} 
      MYSQL_ROOT_PASSWORD: ${DBP}
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: drupal-phpmyadmin
    environment:
      PMA_HOST: ${DBH}
      PMA_USER: ${DBU} 
      PMA_PASSWORD: ${DBP} 
      PMA_ARBITRARY: 1
    restart: always
    depends_on:
      - db
    ports:
      - 8889:80
  drupal:
    build:
      context: .
      dockerfile: Dockerfile.drupal
    container_name: drupal-www
    depends_on:
      - db
    ports:
      - 8888:80
    restart: always
    environment:
      DB_DB: ${DB}
      DB_HOST: ${DBH}
      DB_USER: ${DBU}
      DB_PASSWORD: ${DBP}
      ADMIN_PASSWORD: ${DP}
      TRUSTED_HOST: ${DH}
    working_dir: /opt
    #entrypoint: sleep infinity
    command: bash -c "
        composer update -vvv --no-interaction &&
        rm /var/www/html &&
        ln -s /opt/web /var/www/html &&
        chmod -R 777 /opt/web/sites/default/files &&
        ./vendor/bin/drush updb --cache-clear &&
        ./vendor/bin/drush upwd admin $$ADMIN_PASSWORD &&
        /usr/local/bin/apache2-foreground
      "
